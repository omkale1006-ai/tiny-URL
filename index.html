<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyURL Converter</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #38bdf8;
      --text-color: #f1f5f9;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background-color: var(--card-bg);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    h1 {
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 1rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-color);
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: var(--accent-color);
      color: #0f172a;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading Spinner */
    #loader {
      display: none;
      margin: 20px auto;
      border: 3px solid #334155;
      border-radius: 50%;
      border-top: 3px solid var(--accent-color);
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    #result {
      margin-top: 1.5rem;
      word-break: break-all;
      padding: 10px;
      border-radius: 5px;
      background: rgba(56, 189, 248, 0.1);
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Shorten URL</h1>
    <input type="url" id="urlInput" placeholder="Paste your long link here..." required>
    <button id="submitBtn" onclick="shortenUrl()">Shorten It</button>

    <div id="loader"></div>
    <div id="result"></div>
  </div>

  <script>
    async function shortenUrl() {
      const urlInput = document.getElementById('urlInput').value;
      const btn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');
      const resultDiv = document.getElementById('result');

      if (!urlInput) return alert("Please enter a URL");

      // UI State: Loading
      btn.disabled = true;
      loader.style.display = "block";
      resultDiv.style.display = "none";

      try {
        const response = await fetch('https://kale-patil1006.app.n8n.cloud/webhook/tinyurl', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ longUrl: urlInput })
        });

        const data = await response.json();

        // Success Handling
        loader.style.display = "none";
        btn.disabled = false;

        // Display the result (Assumes webhook returns { "shortUrl": "..." })
        // Adjust 'data.shortUrl' based on your actual n8n output structure
        resultDiv.innerText = data.shortUrl || JSON.stringify(data);
        resultDiv.style.display = "block";

        // Trigger Confetti
        confetti({
          particleCount: 150,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#38bdf8', '#ffffff']
        });

      } catch (error) {
        console.error("Error:", error);
        loader.style.display = "none";
        btn.disabled = false;
        alert("Something went wrong. Check console.");
      }
    }
  </script>

</body>

</html>
